<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Willdo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Mörkt läge (Standard) */ 
    --bg: #1A1814; 
    --surface: #24221E; 
    --ink: #D1CDC7; 
    --ink-soft: #A6A29A; 
    --ink-faint: #4A4640;
    --accent: #C4402A; /* Den milda röda tonen från förstasidan */
    --blue: #5A9BD5; 
    --border: #33302B;
    --shadow: 0 4px 20px rgba(0,0,0,0.3); 
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5); 
    --radius: 12px;
    --theme-btn-bg: #33302B; 
  }

  [data-theme="light"] {
    --bg: #F5F2ED; 
    --surface: #FDFCFA; 
    --ink: #1A1814; 
    --ink-soft: #6B6760; 
    --ink-faint: #C4C1BB;
    --accent: #C4402A; 
    --blue: #2A5C8A; 
    --border: #E8E5DF;
    --shadow: 0 2px 12px rgba(26,24,20,0.08); 
    --shadow-lg: 0 8px 32px rgba(26,24,20,0.12);
    --theme-btn-bg: #E8E5DF; 
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }

  #loading { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
  .spinner { width:32px; height:32px; border:2.5px solid var(--border); border-top-color:var(--ink); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #auth-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; }
  .auth-logo { font-family:'DM Serif Display',serif; font-size:3.5rem; color:var(--ink); margin-bottom:.25rem; letter-spacing:-1px; line-height:1; display: flex; align-items: center; }
  .auth-tag { color:var(--ink-soft); font-size:.95rem; font-weight:300; margin-bottom:3rem; letter-spacing:.05em; text-transform: lowercase; }
  .google-btn { display:flex; align-items:center; gap:.75rem; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:.875rem 1.5rem; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:500; color:var(--ink); cursor:pointer; transition:all .2s; box-shadow:var(--shadow); }
  .google-btn:hover { border-color:var(--ink-soft); box-shadow:var(--shadow-lg); transform:translateY(-1px); }
  .google-btn svg { width:20px; height:20px; flex-shrink:0; }

  #app { display:none; min-height:100vh; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:.875rem 1.25rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:.75rem; }
  .hdr-left { display:flex; align-items:center; gap:.5rem; min-width:0; flex:1; }
  .logo { font-family:'DM Serif Display',serif; font-size:1.5rem; color:var(--ink); letter-spacing:-.5px; cursor:pointer; flex-shrink:0; line-height:1; display: flex; align-items: center; }
  .bc { display:flex; align-items:center; gap:.3rem; min-width:0; overflow:hidden; }
  .bc-sep { color:var(--ink-faint); font-size:.9rem; flex-shrink:0; }
  .bc-item { font-size:.82rem; font-weight:500; color:var(--ink-soft); cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .15s; padding:.15rem .3rem; border-radius:4px; max-width:140px; }
  .bc-item:hover { color:var(--ink); background:var(--bg); }
  .bc-cur { color:var(--ink); cursor:default; }
  .bc-cur:hover { background:none; }
  .hdr-right { display:flex; align-items:center; gap:.5rem; flex-shrink:0; }
  .avatar { width:30px; height:30px; border-radius:50%; object-fit:cover; border:2px solid var(--border); cursor:pointer; flex-shrink:0; }

  .view { display:none; max-width:700px; margin:0 auto; padding:1.25rem; padding-bottom:7rem; }
  .view.active { display:block; }

  .tree-node { margin-bottom:.4rem; }
  .trow { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:.85rem .875rem; display:flex; align-items:center; gap:.65rem; box-shadow:var(--shadow); position:relative; overflow:hidden; transition:border-color .15s, box-shadow .15s; }
  .trow::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
  
  .trow.p5::before { background:var(--accent); }
  .trow.p4::before { background:var(--accent); opacity: 0.7; }
  .trow.p3::before { background:#FFCC00; }
  .trow.p2::before { background:var(--blue); }
  .trow.p1::before { background:var(--ink-faint); }
  
  .trow:hover { border-color:var(--ink-soft); box-shadow:var(--shadow-lg); }
  .trow.step-trow { background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:none; padding:.65rem .75rem; }
  .trow.step-trow::before { display:none; }

  .chev { width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-soft); transition:transform .2s, color .15s, background .15s; flex-shrink:0; border-radius:8px; margin-left:-4px; }
  .chev:hover { color:var(--ink); background:var(--bg); }
  .chev.open { transform:rotate(90deg); color:var(--ink); }
  .chev.inv { visibility:hidden; pointer-events: none; }

  .ibody { flex:1; min-width:0; }
  .iname { font-size:1rem; font-weight:500; line-height:1.35; color:var(--ink); }
  .iname.link { cursor:pointer; transition:color .15s; }
  .iname.link:hover { color:var(--blue); text-decoration:underline; text-decoration-color:var(--ink-faint); text-underline-offset:2px; }
  .imeta { margin-top:.2rem; }
  .mcnt { font-size:.75rem; color:var(--ink-soft); }

  .rowacts { display:flex; gap:.2rem; opacity:0; transition:opacity .15s; flex-shrink:0; align-items:center; }
  .trow:hover .rowacts { opacity:1; }
  .rbtn { background:none; border:none; cursor:pointer; color:var(--ink-faint); padding:2px 4px; border-radius:4px; font-size:.85rem; transition:color .15s; line-height:1; }
  .rbtn:hover { color:var(--accent); }
  .rbtn.sm { font-size:.7rem; font-family:'DM Sans',sans-serif; font-weight:500; }
  .rbtn.sm:hover { color:var(--ink); }

  .willdo-btn { background:none; border:none; cursor:pointer; padding:3px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
  .willdo-btn svg { width:22px; height:22px; transition:all .2s; }
  .willdo-btn.unscheduled svg { color:var(--accent); opacity: 0.6; }
  .willdo-btn.scheduled svg { color:#4CD964; }
  .willdo-btn:hover { background:var(--bg); transform:scale(1.12); }

  .children { margin-left:1.75rem; border-left:1.5px solid var(--border); padding-left:.625rem; margin-top:.3rem; padding-bottom:.2rem; }
  .add-main { width:100%; padding:.875rem; border:1.5px dashed var(--border); border-radius:var(--radius); background:none; color:var(--ink-soft); font-family:'DM Sans',sans-serif; font-size:.9rem; cursor:pointer; margin-top:.75rem; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:.5rem; }
  .add-main:hover { background:var(--surface); border-color:var(--ink-soft); color:var(--ink); }

  .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:.75rem 1.25rem; padding-bottom:calc(.75rem + env(safe-area-inset-bottom)); z-index:90; display:flex; gap:.625rem; align-items:center; justify-content:flex-end; }
  .btm-btn { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:.5rem .875rem; font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:500; color:var(--ink-soft); cursor:pointer; display:flex; align-items:center; gap:.4rem; transition:all .15s; white-space:nowrap; }
  .btm-btn:hover { border-color:var(--ink-soft); color:var(--ink); }
  #theme-btn { background: var(--theme-btn-bg); color: var(--ink); }

  .ftitle { font-family:'DM Serif Display',serif; font-size:1.7rem; color:var(--ink); line-height:1.2; margin-bottom:.6rem; }
  .fprio { display:flex; gap:1.25rem; margin-bottom:.875rem; }
  .fprio-item { display:flex; flex-direction:column; gap:4px; }
  .fprio-lbl { font-size:.68rem; font-weight:500; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; }
  .fpips { display:flex; gap:4px; }
  .fpip { width:8px; height:8px; border-radius:50%; background:var(--border); }
  .fpip.u { background:var(--accent); } 
  .fpip.i { background:var(--blue); }
  .fnotes { font-size:.9rem; color:var(--ink-soft); line-height:1.65; margin-bottom:1rem; font-weight:300; }
  
  .factions { display:flex; gap:.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
  .fbtn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:.4rem .75rem; font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:500; color:var(--ink-soft); cursor:pointer; transition:all .15s; }
  .fbtn:hover { border-color:var(--ink-soft); color:var(--ink); }
  .fbtn.danger { color:var(--accent); border-color:rgba(196, 64, 42, 0.2); }
  .fbtn.danger:hover { background:rgba(196, 64, 42, 0.1); border-color:var(--accent); }

  .prog-wrap { background:var(--border); border-radius:4px; height:4px; margin-bottom:1.25rem; overflow:hidden; }
  .prog-fill { height:100%; background:var(--ink); border-radius:4px; transition:width .3s ease; }

  .shead { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
  .slbl { font-size:.75rem; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; }
  .add-step-btn { background:none; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:500; color:var(--accent); display:flex; align-items:center; gap:.3rem; transition:opacity .15s; }

  .fstep { display:flex; align-items:center; gap:.7rem; padding:.7rem .5rem; border-bottom:1px solid var(--border); border-radius:6px; transition:background .15s; cursor:default; }
  .fstep.dragging { opacity: 0.5; background: var(--surface); }
  .fstep:last-child { border-bottom:none; }
  .fstep:hover { background:rgba(209, 205, 199, 0.05); }
  
  .drag-handle { cursor: grab; color: var(--ink-faint); display: flex; align-items: center; padding: 4px; }
  .drag-handle:active { cursor: grabbing; }

  input[type="checkbox"] { accent-color: var(--blue); cursor: pointer; transform: scale(1.1); }

  .fsbody { flex:1; min-width:0; }
  .fsname { font-size:.92rem; font-weight:500; color:var(--ink); line-height:1.35; }
  .fsname.link { cursor:pointer; transition:color .15s; }
  .fsname.link:hover { color:var(--blue); }
  .fs-sub-cnt { font-size:.72rem; color:var(--ink-soft); margin-top:2px; }
  .fsacts { display:flex; gap:.2rem; opacity:0; transition:opacity .15s; flex-shrink:0; }
  .fstep:hover .fsacts { opacity:1; }
  .fsbtn { background:none; border:none; cursor:pointer; color:var(--ink-faint); padding:2px 4px; border-radius:4px; font-size:.85rem; }

  .sinput-row { display:flex; gap:.5rem; margin-top:.75rem; }
  .sinput { flex:1; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:.6rem .875rem; font-family:'DM Sans',sans-serif; font-size:.9rem; color:var(--ink); outline:none; }
  .sconfirm { background:var(--ink); color:var(--bg); border:none; border-radius:8px; padding:.6rem 1rem; font-family:'DM Sans',sans-serif; font-size:.875rem; font-weight:500; cursor:pointer; }

  .moverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
  .moverlay.open { display:flex; }
  @media(min-width:600px){ .moverlay { align-items:center; } }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0; width:100%; max-width:580px; max-height:90vh; overflow-y:auto; padding:1.5rem 1.25rem 2rem; animation:slideUp .25s ease; }
  @keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .mhdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
  .mttl { font-family:'DM Serif Display',serif; font-size:1.35rem; color:var(--ink); }
  .mclose { background:var(--bg); border:none; cursor:pointer; color:var(--ink-soft); width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

  .fgrp { margin-bottom:1rem; }
  .flbl { display:block; font-size:.75rem; font-weight:600; color:var(--ink-soft); text-transform:uppercase; margin-bottom:.4rem; }
  .finp, .fta { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:.7rem .875rem; font-family:'DM Sans',sans-serif; font-size:.95rem; color:var(--ink); outline:none; }
  
  .fta { 
    resize: none; 
    min-height: 44px; 
    overflow: hidden; 
    display: block;
    line-height: 1.5;
  }

  .scrow { display:flex; gap:.4rem; }
  .scbtn { flex:1; padding:.5rem .2rem; border:1.5px solid var(--border); border-radius:8px; background:var(--bg); font-family:'DM Sans',sans-serif; font-size:.875rem; font-weight:500; color:var(--ink-soft); cursor:pointer; text-align:center; }
  .scbtn.au { background:var(--accent); border-color:var(--accent); color:white; }
  .scbtn.ai { background:var(--blue); border-color:var(--blue); color:white; }
  .scends { display:flex; justify-content:space-between; margin-top:.25rem; }
  .scend { font-size:.67rem; color:var(--ink-soft); font-weight: 500; }

  .save-btn { width:100%; background:var(--ink); color:var(--bg); border:none; border-radius:var(--radius); padding:.875rem; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:500; cursor:pointer; margin-top:.5rem; }

  .toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--ink); color:var(--bg); padding:.75rem 1.25rem; border-radius:var(--radius); font-size:.875rem; z-index:999; transition:transform .3s ease; white-space:nowrap; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
</div>

<div id="auth-screen" style="display:none">
  <div class="auth-logo">Willdo🪶</div>
  <div class="auth-tag">perfekt operfekt</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Logga in med Google
  </button>
</div>

<div id="app">
  <header>
    <div class="hdr-left">
      <div class="logo" onclick="goHome()">Willdo🪶</div>
      <div class="bc" id="bc"></div>
    </div>
    <div class="hdr-right">
      <img id="avatar" class="avatar" src="" alt="" onclick="signOut()">
    </div>
  </header>

  <div id="view-tree" class="view active">
    <div id="tree-cont"></div>
    <button class="add-main" onclick="openModal(null)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Lägg till uppgift
    </button>
  </div>

  <div id="view-task" class="view">
    <div class="ftitle" id="ft-title"></div>
    <div class="fprio" id="ft-prio"></div>
    <div class="fnotes" id="ft-notes"></div>
    <div class="factions">
      <button class="fbtn" onclick="openModal('edit')">Redigera</button>
      <button class="fbtn danger" onclick="delCurrentTask()">Ta bort</button>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="ft-prog" style="width:0%"></div></div>
    <div class="shead">
      <span class="slbl">Steg</span>
      <button class="add-step-btn" onclick="showSInput('task')">Lägg till steg</button>
    </div>
    <div id="ft-steps" ondragover="event.preventDefault()"></div>
    <div class="sinput-row" id="task-sinput-row" style="display:none">
      <input class="sinput" id="task-sinput" placeholder="Beskriv steget…" onkeydown="if(event.key==='Enter')confirmS('task')">
      <button class="sconfirm" onclick="confirmS('task')">Lägg till</button>
    </div>
  </div>

  <div id="view-step" class="view">
    <div class="ftitle" id="fs-title"></div>
    <div class="factions"><button class="fbtn" onclick="editStepTitle()">Redigera rubrik</button></div>
    <div class="prog-wrap"><div class="prog-fill" id="fs-prog" style="width:0%"></div></div>
    <div class="shead">
      <span class="slbl">Delsteg</span>
      <button class="add-step-btn" onclick="showSInput('step')">Lägg till delsteg</button>
    </div>
    <div id="fs-steps" ondragover="event.preventDefault()"></div>
    <div class="sinput-row" id="step-sinput-row" style="display:none">
      <input class="sinput" id="step-sinput" placeholder="Beskriv delsteget…" onkeydown="if(event.key==='Enter')confirmS('step')">
      <button class="sconfirm" onclick="confirmS('step')">Lägg till</button>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btm-btn" id="theme-btn" onclick="toggleTheme()">Byt till ljust läge</button>
    <button class="btm-btn" onclick="exportCurrent()">Exportera</button>
  </div>
</div>

<div class="moverlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhdr">
      <div class="mttl" id="mttl">Ny uppgift</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="fgrp"><label class="flbl">Uppgift</label><input class="finp" id="m-name" maxlength="140"></div>
    <div class="fgrp"><label class="flbl">Anteckningar</label><textarea class="fta" id="m-notes" oninput="autoGrow(this)"></textarea></div>
    <div class="fgrp">
      <label class="flbl">Viktigt</label>
      <div class="scrow" id="sc-important">
        <button class="scbtn" onclick="setScale('important',1)" data-v="1">1</button>
        <button class="scbtn" onclick="setScale('important',2)" data-v="2">2</button>
        <button class="scbtn ai" onclick="setScale('important',3)" data-v="3">3</button>
        <button class="scbtn" onclick="setScale('important',4)" data-v="4">4</button>
        <button class="scbtn" onclick="setScale('important',5)" data-v="5">5</button>
      </div>
      <div class="scends"><span class="scend">Inte alls</span><span class="scend">Extremt</span></div>
    </div>
    <div class="fgrp">
      <label class="flbl">Bråttom</label>
      <div class="scrow" id="sc-urgent">
        <button class="scbtn" onclick="setScale('urgent',1)" data-v="1">1</button>
        <button class="scbtn" onclick="setScale('urgent',2)" data-v="2">2</button>
        <button class="scbtn au" onclick="setScale('urgent',3)" data-v="3">3</button>
        <button class="scbtn" onclick="setScale('urgent',4)" data-v="4">4</button>
        <button class="scbtn" onclick="setScale('urgent',5)" data-v="5">5</button>
      </div>
      <div class="scends"><span class="scend">Inte alls</span><span class="scend">Extremt</span></div>
    </div>
    <button class="save-btn" onclick="saveModal()">Spara</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyCiTNrzw79kn5MpVnCiEY5ym6haHx6_X1M",
  authDomain:"willdo-2f23b.firebaseapp.com",
  projectId:"willdo-2f23b",
  storageBucket:"willdo-2f23b.firebasestorage.app",
  messagingSenderId:"780576068769",
  appId:"1:780576068769:web:023ccea934d01aaddb0ce0"
};
const fa = initializeApp(cfg);
const auth = getAuth(fa);
const db = getFirestore(fa);

let user=null, tasks=[], expanded=new Set();
let focusTask=null, focusStep=null;
let modalMode=null, selI=3, selU=3;
let dragIdx = null;

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-btn').innerText = theme === 'dark' ? 'Byt till ljust läge' : 'Byt till mörkt läge';
    localStorage.setItem('willdo-theme', theme);
}
window.toggleTheme = () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
};
const savedTheme = localStorage.getItem('willdo-theme') || 'dark';
applyTheme(savedTheme);

onAuthStateChanged(auth, u => {
  document.getElementById('loading').style.display='none';
  if(u){
    user=u;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    if(u.photoURL) document.getElementById('avatar').src=u.photoURL;
    subscribe();
    if(!history.state) history.replaceState({view:'tree', focusTask:null, focusStep:null}, "");
  } else {
    user=null;
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

window.onpopstate = e => {
  if (e.state) {
    focusTask = e.state.focusTask; focusStep = e.state.focusStep;
    switchView(e.state.view, false);
  }
};

function switchView(id, push=true) {
  if (push) history.pushState({view: id, focusTask, focusStep}, "");
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  renderCurrentView();
  updateBC();
}

window.goHome = () => { focusTask=null; focusStep=null; switchView('tree'); };
window.goFocusTask = tid => { focusTask=tid; focusStep=null; switchView('task'); };
window.goFocusStep = (tid, idx) => { focusTask=tid; focusStep=idx; switchView('step'); };

function subscribe(){
  const q=query(collection(db,'users',user.uid,'tasks'),orderBy('createdAt','desc'));
  onSnapshot(q,snap=>{
    tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCurrentView();
    updateBC();
  });
}

function renderCurrentView(){
    const v = curView();
    if(v==='tree') renderTree();
    else if(v==='task') renderFocusTask(focusTask);
    else if(v==='step') renderFocusStep(focusTask, focusStep);
}

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const curView = () => {
    if(document.getElementById('view-tree').classList.contains('active')) return 'tree';
    if(document.getElementById('view-task').classList.contains('active')) return 'task';
    return 'step';
};
const sc = t => (t.important||3)*10+(t.urgent||3);
const pc = t => {
  const s=sc(t);
  return s>=50?'p5':s>=43?'p4':s>=35?'p3':s>=25?'p2':'p1';
};

window.handleDragStart = (e, i) => {
    dragIdx = i;
    e.target.closest('.fstep').classList.add('dragging');
};
window.handleDragEnd = (e) => {
    e.target.closest('.fstep').classList.remove('dragging');
};
window.handleDrop = async (e, targetIdx, type) => {
    if (dragIdx === null || dragIdx === targetIdx) return;
    const t = tasks.find(x => x.id === focusTask);
    const steps = [...t.steps];
    
    if (type === 'task') {
        const item = steps.splice(dragIdx, 1)[0];
        steps.splice(targetIdx, 0, item);
    } else {
        const subs = [...steps[focusStep].substeps];
        const item = subs.splice(dragIdx, 1)[0];
        subs.splice(targetIdx, 0, item);
        steps[focusStep].substeps = subs;
    }
    
    dragIdx = null;
    await updateDoc(doc(db, 'users', user.uid, 'tasks', focusTask), { steps });
};

function renderTree(){
  const c=document.getElementById('tree-cont'); c.innerHTML='';
  const list = tasks.sort((a,b)=>sc(b)-sc(a));
  if(!list.length){ c.innerHTML=`<div class="empty-state"><div class="empty-title">Listan är tom</div></div>`; return; }
  
  list.forEach(task=> {
    const wrap=document.createElement('div'); wrap.className='tree-node';
    const isOpen=expanded.has(task.id), hasSteps=(task.steps||[]).length>0;
    const sd=(task.steps||[]).filter(s=>s.done).length, st=(task.steps||[]).length;
    
    const row=document.createElement('div'); row.className=`trow ${pc(task)}`;
    row.innerHTML=`
      <div class="chev ${hasSteps?'':'inv'} ${isOpen?'open':''}" onclick="event.stopPropagation(); toggleExp('${task.id}')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="ibody" onclick="goFocusTask('${task.id}')">
        <div class="iname link">${esc(task.name)}</div>
        ${st?`<div class="imeta"><span class="mcnt">${sd}/${st} steg</span></div>`:''}
      </div>
      <div class="rowacts"><button class="rbtn sm" onclick="event.stopPropagation(); openModal('edit','${task.id}')">✎</button></div>
      <button class="willdo-btn ${task.scheduled?'scheduled':'unscheduled'}" onclick="event.stopPropagation(); toggleScheduled('${task.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>`;
    wrap.appendChild(row);
    
    if(isOpen && hasSteps){
      const ch=document.createElement('div'); ch.className='children';
      (task.steps||[]).forEach((step,idx)=>{
        const stepId = `${task.id}_${idx}`;
        const isStepOpen = expanded.has(stepId);
        const hasSubsteps = (step.substeps||[]).length > 0;

        const srow=document.createElement('div'); srow.className='trow step-trow'; srow.style.marginBottom='4px';
        srow.innerHTML=`
          <div class="chev ${hasSubsteps?'':'inv'} ${isStepOpen?'open':''}" onclick="event.stopPropagation(); toggleExp('${stepId}')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="ibody" onclick="goFocusStep('${task.id}',${idx})">
            <div class="iname link" style="${step.done?'text-decoration:line-through;opacity:0.4':''}">${esc(step.text)}</div>
          </div>`;
        ch.appendChild(srow);

        // Rendera delsteg (Nivå 3) om steget är utfällt
        if(isStepOpen && hasSubsteps) {
          const subCh=document.createElement('div'); subCh.className='children';
          step.substeps.forEach(sub => {
            const ssrow=document.createElement('div'); ssrow.className='trow step-trow'; ssrow.style.marginBottom='4px';
            ssrow.innerHTML=`
              <div class="chev inv"></div>
              <div class="ibody">
                <div class="iname" style="${sub.done?'text-decoration:line-through;opacity:0.4':''}">${esc(sub.text)}</div>
              </div>`;
            subCh.appendChild(ssrow);
          });
          ch.appendChild(subCh);
        }
      });
      wrap.appendChild(ch);
    }
    c.appendChild(wrap);
  });
}

function renderFocusTask(tid){
  const t=tasks.find(x=>x.id===tid); if(!t) return;
  document.getElementById('ft-title').innerText=t.name;
  document.getElementById('ft-notes').innerText=t.notes||'';
  document.getElementById('ft-prio').innerHTML=`
    <div class="fprio-item"><div class="fprio-lbl">Viktigt</div><div class="fpips">${getPips(t.important||3,'i')}</div></div>
    <div class="fprio-item"><div class="fprio-lbl">Bråttom</div><div class="fpips">${getPips(t.urgent||3,'u')}</div></div>`;
  const steps=t.steps||[], sd=steps.filter(s=>s.done).length, st=steps.length;
  document.getElementById('ft-prog').style.width=st?(sd/st*100)+'%':'0%';
  const cont=document.getElementById('ft-steps'); cont.innerHTML='';
  steps.forEach((s,i)=>{
    const div=document.createElement('div'); div.className='fstep';
    div.draggable = true;
    div.ondragstart = (e) => handleDragStart(e, i);
    div.ondragend = handleDragEnd;
    div.ondrop = (e) => handleDrop(e, i, 'task');
    div.innerHTML=`
      <div class="drag-handle">⋮⋮</div>
      <input type="checkbox" ${s.done?'checked':''} onclick="event.stopPropagation(); toggleStep(${i})">
      <div class="fsbody" onclick="goFocusStep('${tid}',${i})">
        <div class="fsname link" style="${s.done?'text-decoration:line-through;opacity:0.4':''}">${esc(s.text)}</div>
        <div class="fs-sub-cnt">${(s.substeps||[]).length} delsteg</div>
      </div>
      <div class="fsacts"><button class="fsbtn" onclick="event.stopPropagation(); delStep('${tid}',${i})">✕</button></div>`;
    cont.appendChild(div);
  });
}

function renderFocusStep(tid, sidx){
  const t=tasks.find(x=>x.id===tid); if(!t) return;
  const s=(t.steps||[])[sidx]; if(!s) return goFocusTask(tid);
  document.getElementById('fs-title').innerText=s.text;
  const subs=s.substeps||[], sd=subs.filter(x=>x.done).length, st=subs.length;
  document.getElementById('fs-prog').style.width=st?(sd/st*100)+'%':'0%';
  const cont=document.getElementById('fs-steps'); cont.innerHTML='';
  subs.forEach((ss,i)=>{
    const div=document.createElement('div'); div.className='fstep';
    div.draggable = true;
    div.ondragstart = (e) => handleDragStart(e, i);
    div.ondragend = handleDragEnd;
    div.ondrop = (e) => handleDrop(e, i, 'step');
    div.innerHTML=`
      <div class="drag-handle">⋮⋮</div>
      <input type="checkbox" ${ss.done?'checked':''} onclick="event.stopPropagation(); toggleSub(${i})">
      <div class="fsbody"><div class="fsname" style="${ss.done?'text-decoration:line-through;opacity:0.4':''}">${esc(ss.text)}</div></div>
      <div class="fsacts"><button class="fsbtn" onclick="delSub(${i})">✕</button></div>`;
    cont.appendChild(div);
  });
}

const getPips = (v,c) => Array.from({length:5},(_,i)=>`<div class="fpip ${i<v?c:''}"></div>`).join('');

function updateBC(){
  const b=document.getElementById('bc'); b.innerHTML=''; if(!focusTask) return;
  const t=tasks.find(x=>x.id===focusTask);
  if(t){
    b.innerHTML+=`<span class="bc-sep">/</span><span class="bc-item ${focusStep===null?'bc-cur':''}" onclick="goFocusTask('${t.id}')">${esc(t.name)}</span>`;
    if(focusStep!==null){
      const s=(t.steps||[])[focusStep];
      if(s) b.innerHTML+=`<span class="bc-sep">/</span><span class="bc-item bc-cur">${esc(s.text)}</span>`;
    }
  }
}

window.toggleExp = id => { expanded.has(id)?expanded.delete(id):expanded.add(id); renderTree(); };
window.toggleScheduled = async id => {
  const t=tasks.find(x=>x.id===id);
  await updateDoc(doc(db,'users',user.uid,'tasks',id), {scheduled: !t.scheduled});
};
window.delTask = async id => { if(confirm('Radera uppgift?')) await deleteDoc(doc(db,'users',user.uid,'tasks',id)); };
window.delCurrentTask = () => delTask(focusTask);

window.toggleStep = async idx => {
  const t=tasks.find(x=>x.id===focusTask), steps=[...t.steps];
  steps[idx].done = !steps[idx].done;
  await updateDoc(doc(db,'users',user.uid,'tasks',focusTask), {steps});
};
window.delStep = async (tid, idx) => {
  const t=tasks.find(x=>x.id===tid), steps=t.steps.filter((_,i)=>i!==idx);
  await updateDoc(doc(db,'users',user.uid,'tasks',tid), {steps});
};
window.toggleSub = async idx => {
  const t=tasks.find(x=>x.id===focusTask), steps=[...t.steps], subs=[...steps[focusStep].substeps];
  subs[idx].done = !subs[idx].done;
  steps[focusStep].substeps = subs;
  await updateDoc(doc(db,'users',user.uid,'tasks',focusTask), {steps});
};
window.delSub = async idx => {
  const t=tasks.find(x=>x.id===focusTask), steps=[...t.steps];
  steps[focusStep].substeps = steps[focusStep].substeps.filter((_,i)=>i!==idx);
  await updateDoc(doc(db,'users',user.uid,'tasks',focusTask), {steps});
};

window.showSInput = type => {
  document.getElementById(type+'-sinput-row').style.display='flex';
  document.getElementById(type+'-sinput').focus();
};
window.confirmS = async type => {
  const inp=document.getElementById(type+'-sinput'), val=inp.value.trim(); if(!val) return;
  const t=tasks.find(x=>x.id===focusTask), steps=[...t.steps];
  if(type==='task') steps.push({text:val, done:false, substeps:[]});
  else steps[focusStep].substeps.push({text:val, done:false});
  await updateDoc(doc(db,'users',user.uid,'tasks',focusTask), {steps});
  inp.value=''; document.getElementById(type+'-sinput-row').style.display='none';
};

window.autoGrow = el => {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
};

window.openModal = (mode, tid) => {
  modalMode=mode; if(tid) focusTask = tid;
  const m=document.getElementById('modal');
  const notesEl = document.getElementById('m-notes');
  
  if(mode==='edit'){
    const t=tasks.find(x=>x.id===focusTask);
    document.getElementById('mttl').innerText='Redigera';
    document.getElementById('m-name').value=t.name; 
    notesEl.value=t.notes||'';
    setScale('important',t.important||3); setScale('urgent',t.urgent||3);
  } else {
    document.getElementById('mttl').innerText='Ny uppgift';
    document.getElementById('m-name').value=''; 
    notesEl.value='';
    setScale('important',3); setScale('urgent',3);
  }
  
  m.classList.add('open');
  // Kör autogrow efter att modalen blivit synlig
  setTimeout(() => autoGrow(notesEl), 0);
};

window.closeModal = () => document.getElementById('modal').classList.remove('open');
window.setScale = (type, v) => {
  if(type==='important') selI=v; else selU=v;
  document.querySelectorAll(`#sc-${type} .scbtn`).forEach(b=> {
    b.classList.remove('ai','au');
    if(parseInt(b.dataset.v)===v) b.classList.add(type==='important'?'ai':'au');
  });
};
window.saveModal = async () => {
  const name=document.getElementById('m-name').value.trim(); if(!name) return;
  const data={ name, notes:document.getElementById('m-notes').value, important:selI, urgent:selU };
  if(modalMode==='edit') await updateDoc(doc(db,'users',user.uid,'tasks',focusTask), data);
  else await addDoc(collection(db,'users',user.uid,'tasks'), {...data, steps:[], done:false, createdAt:serverTimestamp()});
  closeModal();
};
window.editStepTitle = async () => {
  const t=tasks.find(x=>x.id===focusTask), steps=[...t.steps], old=steps[focusStep].text;
  const val=prompt('Ny rubrik:', old);
  if(val && val!==old){ steps[focusStep].text=val; await updateDoc(doc(db,'users',user.uid,'tasks',focusTask), {steps}); }
};

window.exportCurrent = () => {
  const v=curView(); let txt='';
  if(v==='tree'){
    tasks.sort((a,b)=>sc(b)-sc(a)).forEach(t=>{
      txt+=`${t.name} [V:${t.important||3}/5 B:${t.urgent||3}/5]${t.scheduled?' ✓Inbokat':''}\n`;
      if(t.notes) txt+=`  ${t.notes}\n`;
      (t.steps||[]).forEach((s,i)=> {
        txt+=`  ○ ${s.text}\n`;
        (s.substeps||[]).forEach(ss => txt+=`    - ${ss.text}\n`);
      });
      txt+='\n';
    });
  } else if(v==='task'){
    const t=tasks.find(x=>x.id===focusTask);
    txt=`=== ${t.name} ===\n${t.notes||''}\n\nSteg:\n` + (t.steps||[]).map(s=>`○ ${s.text}`).join('\n');
  } else {
    const t=tasks.find(x=>x.id===focusTask), s=t.steps[focusStep];
    txt=`=== ${t.name} › ${s.text} ===\n\nDelsteg:\n` + (s.substeps||[]).map(ss=>`○ ${ss.text}`).join('\n');
  }
  navigator.clipboard.writeText(txt).then(()=>toast('Kopierat till urklipp!'));
};

const toast = msg => {
  const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
};

window.signInWithGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
window.signOut = () => fbSignOut(auth);
</script>
</body>
